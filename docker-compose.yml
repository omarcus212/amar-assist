services:
  mysql:
    image: mysql:8.0
    container_name: product_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: { nome database }
      MYSQL_USER: { nome usuário }
      MYSQL_PASSWORD: { password }
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
