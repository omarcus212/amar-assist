services:
  mysql:
    image: mysql:8.0
    container_name: product_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: { sua senha }
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
